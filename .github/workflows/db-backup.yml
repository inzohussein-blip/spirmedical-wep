# ═══════════════════════════════════════════════════════════════
# 💾 Database Backup - أمان البيانات (V25.12)
# ═══════════════════════════════════════════════════════════════
# Supabase يقوم بـ backup تلقائي يومي (PITR في الـ Pro plan).
# هذا الـ workflow يأخذ snapshot إضافي يحفظه في GitHub artifacts
# للاحتفاظ لمدة 90 يوماً كنسخة احتياطية ثانوية.
#
# ─── ملاحظات ───
# • يحتاج SUPABASE_DB_PASSWORD في GitHub Secrets
# • يحتاج SUPABASE_DB_HOST (db.xxx.supabase.co)
# • يعمل يومياً الساعة 3 صباحاً UTC (6 صباحاً بغداد)
# ═══════════════════════════════════════════════════════════════

name: Database Backup

on:
  schedule:
    - cron: '0 3 * * *'  # يومياً الساعة 3 ص UTC
  workflow_dispatch:      # يدوياً للطوارئ

jobs:
  backup:
    name: Backup Supabase DB
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-common postgresql-client

      - name: Backup database
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          DB_USER: postgres
          DB_NAME: postgres
        run: |
          if [ -z "$PGPASSWORD" ] || [ -z "$DB_HOST" ]; then
            echo "⚠️ SUPABASE_DB_PASSWORD or SUPABASE_DB_HOST not configured"
            echo "Set them in: GitHub repo → Settings → Secrets and variables → Actions"
            exit 0
          fi

          BACKUP_FILE="spirmedical_backup_$(date +%Y%m%d_%H%M%S).sql.gz"

          echo "🔄 Creating backup..."

          # backup مع compression
          pg_dump \
            -h "$DB_HOST" \
            -U "$DB_USER" \
            -d "$DB_NAME" \
            --no-owner \
            --no-privileges \
            --clean \
            --if-exists \
            --schema=public \
            --schema=auth \
            | gzip -9 > "$BACKUP_FILE"

          # إحصائيات
          SIZE=$(du -h "$BACKUP_FILE" | cut -f1)
          ROWS=$(zcat "$BACKUP_FILE" | grep -c "^INSERT" || echo "0")

          echo "✓ Backup created: $BACKUP_FILE ($SIZE)"
          echo "✓ INSERT statements: $ROWS"

          echo "BACKUP_FILE=$BACKUP_FILE" >> $GITHUB_ENV
          echo "BACKUP_SIZE=$SIZE" >> $GITHUB_ENV

      - name: Upload backup artifact
        if: env.BACKUP_FILE != ''
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 90

      - name: Summary
        if: always()
        run: |
          echo "## 💾 Database Backup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ env.BACKUP_FILE }}" ]; then
            echo "✅ Backup successful" >> $GITHUB_STEP_SUMMARY
            echo "- File: \`${{ env.BACKUP_FILE }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- Size: ${{ env.BACKUP_SIZE }}" >> $GITHUB_STEP_SUMMARY
            echo "- Retention: 90 days" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Backup skipped (credentials not configured)" >> $GITHUB_STEP_SUMMARY
          fi
